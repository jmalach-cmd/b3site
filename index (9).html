<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b3 — Development Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --mint:#6EBF8B;--mint-light:#EAF5EF;--mint-mid:#B8DFC7;--mint-dark:#3D9E62;--mint-text:#1E6B40;
  --bg:#F5F6F7;--surface:#FFFFFF;--surface-2:#FAFAFA;
  --border:#E4E6EA;--border-strong:#C8CBD2;
  --text:#0F1117;--text-2:#4B5060;--text-3:#9499A8;
  --danger:#DC3545;--danger-bg:#FDF2F3;--danger-border:#F5C6CB;
  --warning:#C47D0E;--warning-bg:#FEF9EC;--warning-border:#FDDFA0;
  --success:#1A7F3C;--success-bg:#EDF7F1;--success-border:#A8DFB8;
  --blue:#2563EB;--blue-bg:#EFF4FF;
  --purple:#7C3AED;--purple-bg:#F5F0FF;
  --sidebar-w:232px;
  --font:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

/* ── AUTH ─────────────────────────────────────────── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#F0F4F8 0%,#E8F5EF 100%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:400px;box-shadow:var(--shadow-md)}
.auth-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.auth-logomark{width:38px;height:38px;background:var(--text);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;letter-spacing:-.5px;position:relative;flex-shrink:0}
.auth-logomark-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);position:absolute;right:-2px;bottom:-2px;border:2px solid var(--surface)}
.auth-wordmark{font-size:22px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.auth-tagline{font-size:13px;color:var(--text-3);margin-bottom:32px}
.auth-label{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;display:block;letter-spacing:.01em}
.auth-input{width:100%;padding:10px 13px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface-2);margin-bottom:14px;outline:none;transition:border-color .15s,box-shadow .15s}
.auth-input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(110,191,139,.15)}
.auth-btn{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:6px;letter-spacing:.01em}
.auth-btn:hover{opacity:.87}
.auth-error{font-size:12px;color:var(--danger);margin-top:10px}

/* ── APP SHELL ─────────────────────────────────────── */
#app{display:none;height:100vh;width:100vw;overflow:hidden;position:fixed;top:0;left:0}
.layout{display:flex;height:100%;width:100%}

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto}
.sidebar-logo{padding:22px 18px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:30px;height:30px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;position:relative;flex-shrink:0}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--mint);position:absolute;right:-2px;bottom:-2px;border:2px solid var(--surface)}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
.nav-section{padding:16px 10px 4px}
.nav-label{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.08em;text-transform:uppercase;padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-2);font-size:13px;font-weight:400;transition:background .12s,color .12s;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--mint-light);color:var(--mint-text);font-weight:500}
.nav-icon{font-size:14px;width:17px;text-align:center;opacity:.65;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg)}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--mint-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--mint-text);flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:var(--text)}
.user-role{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em}
.logout-btn{margin-left:auto;font-size:11px;color:var(--text-3);cursor:pointer;padding:4px 7px;border-radius:4px;transition:all .12s;border:1px solid transparent}
.logout-btn:hover{color:var(--danger);border-color:var(--danger-border);background:var(--danger-bg)}

/* ── MAIN ─────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.page-header{padding:28px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px}
.page-title{font-size:21px;font-weight:600;letter-spacing:-.4px;color:var(--text)}
.page-sub{font-size:13px;color:var(--text-3);margin-top:3px}
.page-content{padding:22px 32px 48px;flex:1}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.btn-primary{background:var(--text);color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.btn-primary:hover{opacity:.86}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border-strong)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-mint{background:var(--mint-light);color:var(--mint-text);border:1px solid var(--mint-mid)}
.btn-mint:hover{background:var(--mint-mid);color:var(--mint-text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

/* ── CARDS ─────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}

/* ── METRIC CARDS ─────────────────────────────────── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:var(--shadow)}
.metric-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.metric-label{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.metric-value{font-size:26px;font-weight:600;letter-spacing:-.5px;font-family:var(--mono);line-height:1}
.metric-sub{font-size:11px;color:var(--text-3);margin-top:5px}
.metric-accent{border-left:3px solid var(--mint)}

/* ── ALERTS ─────────────────────────────────────── */
.alert-strip{display:flex;flex-direction:column;gap:6px;margin-bottom:22px}
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5}
.alert-danger{background:var(--danger-bg);color:#9B1C28;border:1px solid var(--danger-border)}
.alert-warning{background:var(--warning-bg);color:#7A4E08;border:1px solid var(--warning-border)}
.alert-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:5px}

/* ── TABLES ─────────────────────────────────────── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface-2)}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-link{cursor:pointer;transition:background .1s}
tr.row-link:hover td{background:var(--bg)}

/* ── BADGES ──────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.01em;white-space:nowrap}
.badge-active{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge-construction{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.badge-prospecting{background:var(--blue-bg);color:var(--blue);border:1px solid #BFCFFE}
.badge-contract{background:var(--purple-bg);color:var(--purple);border:1px solid #DDD6FE}
.badge-leaseup{background:var(--mint-light);color:var(--mint-text);border:1px solid var(--mint-mid)}
.badge-exited{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.badge-hold{background:#F9FAFB;color:#9CA3AF;border:1px solid var(--border)}
.badge-open{background:var(--blue-bg);color:var(--blue);border:1px solid #BFCFFE}
.badge-inprog{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.badge-done{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge-overdue{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.badge-in{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge-out{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}

/* ── TABS ────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--mint-dark);font-weight:500}

/* ── MODALS ──────────────────────────────────────── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,17,23,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px 32px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-md)}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;letter-spacing:-.3px}
.modal-close{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text-3);line-height:1;transition:all .12s}
.modal-close:hover{color:var(--text);background:var(--border)}
.form-row{margin-bottom:15px}
.form-label{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface-2);outline:none;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(110,191,139,.12)}
.form-textarea{resize:vertical;min-height:76px;line-height:1.5}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}

/* ── DEAL DETAIL ─────────────────────────────────── */
.deal-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);cursor:pointer;margin-bottom:10px;transition:color .12s;font-weight:500;letter-spacing:.01em;text-transform:uppercase}
.deal-back:hover{color:var(--text)}
.deal-meta-row{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.deal-address{font-size:13px;color:var(--text-3)}
.deal-stat{font-size:12px;color:var(--text-3);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:20px}

/* ── STAT GRID ──────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--border);box-shadow:var(--shadow)}
.stat-cell{background:var(--surface);padding:16px 18px}
.stat-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.stat-value{font-size:15px;font-weight:600;color:var(--text)}
.stat-value.money{font-family:var(--mono);font-size:14px}

/* ── SOURCES & USES ─────────────────────────────── */
.su-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.su-row:last-child{border-bottom:none}
.su-row.total-row{background:var(--surface-2);margin:0 -22px;padding:10px 22px;font-weight:600}
.su-label{flex:1;font-size:13px;color:var(--text-2)}
.su-amount{font-family:var(--mono);font-size:13px;color:var(--text);min-width:110px;text-align:right}
.su-pct{font-family:var(--mono);font-size:11px;color:var(--text-3);min-width:54px;text-align:right}
.su-bar-wrap{width:90px;height:6px;background:var(--bg);border-radius:3px;margin:0 12px;overflow:hidden}
.su-bar{height:100%;border-radius:3px;background:var(--mint)}
.su-section-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-3);padding:14px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px}
.su-source-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:14px 0 8px}
.su-source-seg{height:100%;transition:opacity .15s}
.su-source-seg:hover{opacity:.8}

/* ── CONTACTS ───────────────────────────────────── */
.contact-card{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.contact-card:last-child{border-bottom:none}
.contact-av{width:36px;height:36px;border-radius:50%;background:var(--mint-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--mint-text);flex-shrink:0}
.contact-name{font-size:14px;font-weight:500;color:var(--text)}
.contact-role{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.contact-detail{font-size:12px;color:var(--text-2);margin-top:4px}

/* ── CAPITAL STACK ──────────────────────────────── */
.stack-bar{border-radius:6px;overflow:hidden;height:28px;display:flex;margin:14px 0}
.stack-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;cursor:default;min-width:2px;transition:opacity .15s}
.stack-seg:hover{opacity:.82}

/* ── MILESTONES ─────────────────────────────────── */
.milestone-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.milestone-item:last-child{border-bottom:none}
.m-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;font-size:10px;color:#fff}
.m-check.done{background:var(--mint-dark);border-color:var(--mint-dark)}
.m-title{font-size:13.5px;font-weight:500}
.m-title.done{text-decoration:line-through;color:var(--text-3)}
.m-meta{font-size:12px;color:var(--text-3);margin-top:2px}
.m-link{font-size:11px;color:var(--mint-text);background:var(--mint-light);padding:2px 8px;border-radius:4px;text-decoration:none;border:1px solid var(--mint-mid)}

/* ── TASKS ──────────────────────────────────────── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--mint-light);border-color:var(--mint-mid);color:var(--mint-text)}
.filter-btn:hover:not(.active){background:var(--bg)}
.filter-divider{width:1px;background:var(--border);margin:0 2px;align-self:stretch}

/* ── MISC ───────────────────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;padding:72px;color:var(--text-3);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--mint-dark);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.money{font-family:var(--mono)}
.pos{color:var(--success)}
.neg{color:var(--danger)}
.empty{text-align:center;padding:52px 20px;color:var(--text-3)}
.empty-icon{font-size:26px;margin-bottom:10px;opacity:.3}
.empty p{font-size:13px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-label{font-size:11px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.06em}
.watermark{font-size:11px;color:var(--text-3)}
.watermark b{color:var(--text-2);font-weight:500}
.search-wrap{position:relative}
.search-input{padding:8px 12px 8px 34px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none;width:230px;transition:border-color .15s,box-shadow .15s}
.search-input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(110,191,139,.12)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.phase-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px}
.phase-pill{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
.phase-pill:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.ov-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.ov-value{font-size:14px;font-weight:500;color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.divider{height:1px;background:var(--border);margin:16px 0}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo-row">
      <div class="auth-logomark">b3<div class="auth-logomark-dot"></div></div>
      <div class="auth-wordmark">b3</div>
    </div>
    <div class="auth-tagline">Development Operations Dashboard</div>
    <label class="auth-label">Email address</label>
    <input class="auth-input" id="auth-email" type="email" placeholder="you@b3dev.com" autocomplete="email">
    <label class="auth-label">Password</label>
    <input class="auth-input" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="auth-btn" id="auth-submit">Sign in →</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-logo">

// ── HELPERS ───────────────────────────────────────
function fmt$(n){if(n==null||n==='')return'—';return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function isOverdue(date,status){return date&&date<today()&&status!=='Done';}
function isDueSoon(date,status){if(!date||status==='Done')return false;const diff=(new Date(date+'T12:00:00')-new Date())/86400000;return diff>=0&&diff<=7;}
function greeting(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function phaseBadge(phase){
  const m={'Prospecting':'badge-prospecting','Under Contract':'badge-contract','Active':'badge-active','Construction':'badge-construction','Lease-up':'badge-leaseup','Stabilized':'badge-leaseup','Exited':'badge-exited','On Hold':'badge-hold','Dead':'badge-hold'};
  return`<span class="badge ${m[phase]||'badge-hold'}">${phase||'—'}</span>`;
}
function taskBadge(status,due){
  if(status==='Done')return`<span class="badge badge-done">Done</span>`;
  if(isOverdue(due,status))return`<span class="badge badge-overdue">Overdue</span>`;
  if(status==='In Progress')return`<span class="badge badge-inprog">In Progress</span>`;
  return`<span class="badge badge-open">Open</span>`;
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id,html){
  document.getElementById(id+'-inner').innerHTML=html;
  document.getElementById(id).classList.add('open');
  document.getElementById(id).onclick=e=>{if(e.target===document.getElementById(id))closeModal(id);};
}
function updateTasksBadge(n){const b=document.getElementById('tasks-badge');if(n>0){b.textContent=n;b.style.display='';}else b.style.display='none';}

  const phaseOrder=['Prospecting','Under Contract','Active','Construction','Lease-up','Stabilized','Exited','On Hold','Dead'];

  soon.slice(0,2).forEach(t=>{const d=allDeals.find(x=>x.id===t.deal_id);alerts.push(`<div class="alert alert-warning"><div class="alert-dot"></div><div>Due soon: <strong>${t.title}</strong> — ${userName(t.assigned_to)}&nbsp;·&nbsp;${d?d.name:''}&nbsp;·&nbsp;${fmtDate(t.due_date)}</div></div>`);});
  document.getElementById('main-content').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Good ${greeting()}, ${(currentUserProfile?.name||'there').split(' ')[0]}</div><div class="page-sub">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div></div>
      <div class="toolbar"><button class="btn btn-ghost btn-sm" onclick="openNewDeal()">+ New Deal</button></div>
    </div>
    <div class="page-content">

      <div class="metric-grid">

        <div class="metric-card metric-accent"><div class="metric-label">Total Capital</div><div class="metric-value" style="font-size:${totalCap>9999999?'16px':'22px'}">${totalCap>0?fmt$(totalCap):'—'}</div><div class="metric-sub">across active deals</div></div>
        <div class="metric-card" onclick="navigateTo('tasks')"><div class="metric-label">Open Tasks</div><div class="metric-value" style="${overdue.length?'color:var(--danger)':''}">${open.length}</div><div class="metric-sub">${overdue.length} overdue</div></div>
        <div class="metric-card" onclick="navigateTo('tasks')"><div class="metric-label">My Tasks</div><div class="metric-value">${mine.length}</div><div class="metric-sub">${soon.filter(t=>t.assigned_to===currentUser.id).length} due this week</div></div>
      </div>
      <div class="section-hd" style="margin-bottom:10px"><div class="section-label">Portfolio by Phase</div><button class="btn btn-ghost btn-sm" onclick="navigateTo('deals')">View all →</button></div>
      <div class="phase-pills">
        ${phaseOrder.filter(p=>phases[p]).map(p=>`<div class="phase-pill" onclick="navigateTo('deals')"><div style="width:8px;height:8px;border-radius:50%;background:${phaseColors[p]};border:1px solid rgba(0,0,0,.1)"></div><span style="color:var(--text-2)">${p}</span><span style="font-weight:700;font-family:var(--mono);font-size:13px">${phases[p]}</span></div>`).join('')}
        ${Object.keys(phases).length===0?'<span style="color:var(--text-3);font-size:13px">No deals yet — run the seed SQL to import your properties</span>':''}
      </div>
      <div class="section-hd"><div class="section-label">All Deals</div></div>
      <div class="table-wrap">
        ${allDeals.length===0?'<div class="empty"><div class="empty-icon">◫</div><p>No deals yet.</p></div>':`
        <table>
          <thead><tr><th>Property</th><th>Phase</th><th>Units</th><th>Total Cost</th><th>Open Tasks</th></tr></thead>
          <tbody>
            ${allDeals.map(d=>{
              const dt=allTasks.filter(t=>t.deal_id===d.id&&t.status!=='Done');
              const od=dt.filter(t=>isOverdue(t.due_date,t.status));
              return`<tr class="row-link" onclick="navigateTo('deal-detail','${d.id}')">
                <td><div style="font-weight:500">${d.name}</div>${d.address?`<div style="font-size:12px;color:var(--text-3);margin-top:1px">${d.address}</div>`:''}</td>

// ── DEAL DETAIL ───────────────────────────────────
async function renderDealDetail(dealId){
  const [{data:deal},{data:tasks},{data:stack},{data:milestones},{data:payments},{data:contacts},{data:su}]=await Promise.all([
    sb.from('deals').select('*').eq('id',dealId).single(),
    sb.from('tasks').select('*').eq('deal_id',dealId).order('due_date'),
    sb.from('capital_stack').select('*').eq('deal_id',dealId).order('id'),
    sb.from('milestones').select('*').eq('deal_id',dealId).order('target_date'),
    sb.from('payments').select('*').eq('deal_id',dealId).order('pay_date',{ascending:false}),
    sb.from('contacts').select('*').eq('deal_id',dealId).order('role'),
    sb.from('sources_uses').select('*').eq('deal_id',dealId).order('section').order('sort_order')
  ]);
  if(!deal){document.getElementById('main-content').innerHTML='<div class="loading">Deal not found.</div>';return;}
  const tabs=['overview','sources-uses','capital-stack','contacts','milestones','payments','links','images'];
  document.getElementById('main-content').innerHTML=`
    <div class="page-header">
      <div style="width:100%">
        <div class="deal-back" onclick="navigateTo('deals')">← All Deals</div>
        <div class="page-title">${deal.name}</div>
        <div class="deal-meta-row">
          ${phaseBadge(deal.phase)}
          ${deal.address?`<span class="deal-address">📍 ${deal.address}</span>`:''}
          ${deal.type?`<span class="deal-stat">${deal.type}</span>`:''}
          ${deal.num_units?`<span class="deal-stat">${deal.num_units} units</span>`:''}
          ${deal.site_improvements?`<span class="deal-stat">Site Improvements: ${fmt$(deal.site_improvements)}</span>`:''}
        </div>
      </div>
    </div>
    <div class="page-content">
      <div class="tab-bar">
        ${tabs.map(t=>`<div class="tab ${currentDealTab===t?'active':''}" onclick="switchDealTab('${t}','${dealId}')">${t.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>`).join('')}
      </div>
      <div id="deal-tab-content">
        ${renderDealTab(currentDealTab,deal,tasks||[],stack||[],milestones||[],payments||[],contacts||[],su||[])}
      </div>
    </div>`;
}
function switchDealTab(tab,dealId){currentDealTab=tab;renderDealDetail(dealId).catch(err=>{console.error(err);});}
function renderDealTab(tab,deal,tasks,stack,milestones,payments,contacts,su){
  if(tab==='overview')return renderOverview(deal,tasks,payments,stack);
  if(tab==='sources-uses')return renderSourcesUses(deal,su,stack,payments);
  if(tab==='capital-stack')return renderCapitalStack(deal,stack);
  if(tab==='contacts')return renderContacts(deal,contacts);
  if(tab==='milestones')return renderMilestones(deal,milestones);
  if(tab==='payments')return renderPayments(deal,payments);
  if(tab==='links')return renderLinks(deal);
  if(tab==='images')return renderImages(deal);
  return'';
}

  const totalCommitted=Number(deal.total_cost||0);
  const stackCommitted=(stack||[]).reduce((s,r)=>s+Number(r.amount||0),0);
  return`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px">

        <div class="metric-value" style="font-size:22px">${fmt$(totalCommitted||stackCommitted||null)}</div>

      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div class="card" style="padding:20px 22px;margin-bottom:16px">
          <div class="section-hd" style="margin-bottom:16px"><div class="section-label">Deal Info</div><button class="btn btn-ghost btn-sm" onclick="openEditDeal(${deal.id})">Edit</button></div>
          <div class="stat-grid" style="margin-bottom:16px">
            <div class="stat-cell"><div class="stat-label">Acquisition</div><div class="stat-value money">${fmt$(deal.acquisition_price)}</div></div>
            <div class="stat-cell"><div class="stat-label">Total Cost</div><div class="stat-value money">${fmt$(deal.total_cost)}</div></div>
            <div class="stat-cell"><div class="stat-label">Units</div><div class="stat-value">${deal.num_units||'—'}</div></div>
            <div class="stat-cell"><div class="stat-label">Site Improvements</div><div class="stat-value money">${fmt$(deal.site_improvements)}</div></div>
            <div class="stat-cell"><div class="stat-label">Close Date</div><div class="stat-value">${fmtDate(deal.close_date)}</div></div>
            <div class="stat-cell"><div class="stat-label">Target Exit</div><div class="stat-value">${fmtDate(deal.target_exit_date)}</div></div>
          </div>
          ${deal.notes?`<div class="divider"></div><div class="ov-label" style="margin-bottom:5px">Notes</div><div style="font-size:13px;color:var(--text-2);line-height:1.6">${deal.notes}</div>`:''}
        </div>
      </div>
      <div>
        <div class="card" style="padding:20px 22px">
          <div class="section-hd" style="margin-bottom:12px">
            <div class="section-label">Tasks <span style="color:var(--text-3);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0">${open.length} open · ${done.length} done</span></div>
            <button class="btn btn-ghost btn-sm" onclick="openNewTask(${deal.id})">+ Add</button>
          </div>
          ${open.length===0?`<div style="color:var(--text-3);font-size:13px;padding:16px 0;text-align:center">All tasks complete ✓</div>`:''}
          ${open.map(t=>`
            <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:500;${isOverdue(t.due_date,t.status)?'color:var(--danger)':''};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</div>
                <div style="font-size:11px;color:var(--text-3);margin-top:2px">${userName(t.assigned_to)} · ${fmtDate(t.due_date)}${t.created_by&&t.created_by!==t.assigned_to?` <span class="watermark">· by <b>${userName(t.created_by)}</b></span>`:''}</div>
              </div>
              <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
                ${taskBadge(t.status,t.due_date)}
                ${t.status!=='Done'?`<button class="btn btn-mint btn-xs" onclick="markTaskDone(${t.id},'${deal.id}')">✓</button>`:''}<button class="btn btn-ghost btn-xs" onclick="openTaskModal(${deal.id},t)">Edit</button>
              </div>
            </div>`).join('')}
          ${open.length>0&&done.length>0?`<div style="font-size:11px;color:var(--text-3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${done.length} completed tasks not shown</div>`:''}
        </div>
      </div>
    </div>`;
}

// ── SOURCES & USES TAB ────────────────────────────
function renderSourcesUses(deal,su,stack,payments){
  const uses=su.filter(r=>r.section==='use');
  const manualSources=su.filter(r=>r.section==='source');
  const stackSources=(stack||[]).map(r=>({id:'stack_'+r.id,label:r.party?`${r.tier} — ${r.party}`:r.tier,amount:r.amount,category:r.tier,fromStack:true,tier:r.tier}));
  const allSources=[...stackSources,...manualSources];
  const totalUses=uses.reduce((s,r)=>s+Number(r.amount||0),0);
  const totalSources=allSources.reduce((s,r)=>s+Number(r.amount||0),0);
  const balanced=Math.abs(totalUses-totalSources)<1;
  const hardCosts=uses.filter(r=>r.category==='hard').reduce((s,r)=>s+Number(r.amount||0),0);
  const softCosts=uses.filter(r=>r.category==='soft').reduce((s,r)=>s+Number(r.amount||0),0);
  const tierColors={'Senior Debt':'#0F1117','Mezzanine':'#4B5060','Preferred Equity':'#6EBF8B','LP Equity':'#3D9E62','GP Equity':'#1E6B40','Other':'#9499A8'};
  const debtTiers=['Senior Debt','Mezzanine'];
  const equityTiers=['Preferred Equity','LP Equity','GP Equity'];
  const paidByUse={};
  (payments||[]).filter(p=>p.su_id!=null).forEach(p=>{const k=String(p.su_id);paidByUse[k]=(paidByUse[k]||0)+Number(p.amount||0);});
  return`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      <div class="metric-card"><div class="metric-label">Total Uses</div><div class="metric-value" style="font-size:20px">${fmt$(totalUses)}</div><div class="metric-sub">Total project cost</div></div>
      <div class="metric-card"><div class="metric-label">Total Sources</div><div class="metric-value" style="font-size:20px">${fmt$(totalSources)}</div><div class="metric-sub">${balanced?'✓ Balanced':'⚠ Sources ≠ Uses'}</div></div>
      <div class="metric-card"><div class="metric-label">Hard Costs</div><div class="metric-value" style="font-size:20px">${fmt$(hardCosts)}</div><div class="metric-sub">${totalUses>0?((hardCosts/totalUses)*100).toFixed(1)+'% of total':''}</div></div>
      <div class="metric-card"><div class="metric-label">Soft Costs</div><div class="metric-value" style="font-size:20px">${fmt$(softCosts)}</div><div class="metric-sub">${totalUses>0?((softCosts/totalUses)*100).toFixed(1)+'% of total':''}</div></div>
    </div>
    ${allSources.length>1?`
    <div class="card" style="padding:14px 18px;margin-bottom:20px">
      <div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Sources Breakdown</div>
      <div class="su-source-bar" style="height:14px;border-radius:7px">
        ${allSources.map(r=>{const pct=totalSources>0?Number(r.amount)/totalSources*100:0;const isDebt=debtTiers.includes(r.tier||r.category);return`<div class="su-source-seg" style="width:${pct}%;background:${tierColors[r.tier||r.category]||'#9CA3AF'}" title="${r.label}: ${fmt$(r.amount)} (${isDebt?'Debt':'Equity'})"></div>`;}).join('')}
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:8px">
        ${allSources.map(r=>{const isDebt=debtTiers.includes(r.tier||r.category);return`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2)"><div style="width:8px;height:8px;border-radius:2px;background:${tierColors[r.tier||r.category]||'#9CA3AF'}"></div><span>${r.label}</span><span class="badge" style="font-size:9px;padding:1px 5px;${isDebt?'background:#EFF4FF;color:#2563EB;border-color:#BFCFFE':'background:#EAF5EF;color:#1E6B40;border-color:#B8DFC7'}">${isDebt?'Debt':'Equity'}</span><span style="font-family:var(--mono);font-weight:500">${fmt$(r.amount)}</span></div>`;}).join('')}
      </div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card" style="padding:20px 22px">
        <div class="section-hd" style="margin-bottom:8px"><div class="section-label">Uses of Funds</div><button class="btn btn-ghost btn-sm" onclick="openNewSU(${deal.id},'use')">+ Add</button></div>
        <div style="font-size:11px;color:var(--text-3);margin-bottom:12px">Progress bars fill as payments are logged against each line.</div>
        ${uses.length===0?'<div class="empty" style="padding:28px"><p>No uses entered yet.</p></div>':`
        ${['acquisition','hard','soft','financing','other'].map(cat=>{const catItems=uses.filter(r=>r.category===cat);if(!catItems.length)return'';const catLabels={'acquisition':'Acquisition','hard':'Hard Costs','soft':'Soft Costs','financing':'Financing Costs','other':'Other'};return`<div class="su-section-head">${catLabels[cat]||cat}</div>${catItems.map(r=>suRowWithProgress(r,totalUses,deal.id,paidByUse[String(r.id)]||0)).join('')}`;}).join('')}
        <div class="su-row total-row"><span class="su-label" style="font-weight:600;color:var(--text)">Total Uses</span><span class="su-amount" style="font-weight:600">${fmt$(totalUses)}</span><span class="su-pct" style="font-weight:600">100%</span></div>`}
      </div>
      <div class="card" style="padding:20px 22px">
        <div class="section-hd" style="margin-bottom:8px"><div class="section-label">Sources of Funds</div><button class="btn btn-ghost btn-sm" onclick="openNewSU(${deal.id},'source')">+ Add Manual</button></div>
        <div style="font-size:11px;color:var(--text-3);margin-bottom:12px">Auto-populated from Capital Stack. Add manual sources for items outside the stack.</div>
        ${allSources.length===0?'<div class="empty" style="padding:28px"><p>Add entries to Capital Stack to populate sources.</p></div>':`
        ${stackSources.length?`<div class="su-section-head">From Capital Stack</div>${stackSources.map(r=>suSourceRow(r,totalSources,deal.id,debtTiers,equityTiers,false)).join('')}`:''}
        ${manualSources.length?`<div class="su-section-head">Manual Additions</div>${manualSources.map(r=>suSourceRow(r,totalSources,deal.id,debtTiers,equityTiers,true)).join('')}`:''}
        <div class="su-row total-row"><span class="su-label" style="font-weight:600;color:var(--text)">Total Sources</span><span class="su-amount" style="font-weight:600">${fmt$(totalSources)}</span><span class="su-pct" style="font-weight:600">100%</span></div>`}
      </div>
    </div>`;
}
function suRowWithProgress(r,total,dealId,paid){
  const pct=total>0?(Number(r.amount)/total*100):0;
  const allocPct=Number(r.amount)>0?Math.min((paid/Number(r.amount))*100,100):0;
  const displayPct=paid>0&&allocPct<1?1:allocPct; // show at least 1% width if any payment exists
  const overBudget=paid>Number(r.amount)&&Number(r.amount)>0;
  return`<div class="su-row" style="flex-direction:column;align-items:flex-start;gap:6px;padding:10px 0">
    <div style="display:flex;align-items:center;width:100%;gap:8px">
      <span class="su-label">${r.label}</span>
      <span class="su-amount">${fmt$(r.amount)}</span>
      <span class="su-pct">${pct.toFixed(1)}%</span>
      <button class="btn btn-ghost btn-xs" onclick="openSUModal('${dealId}',r.section,${r.id})">Edit</button><button class="btn btn-ghost btn-xs" onclick="deleteSU(${r.id},'${dealId}')">×</button>
    </div>
    <div style="width:100%">
      <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
        <div style="height:100%;width:${displayPct}%;background:${overBudget?'var(--danger)':'var(--mint)'};border-radius:3px;transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        <span style="font-size:10px;color:${overBudget?'var(--danger)':'var(--text-3)'}">Paid: ${fmt$(paid)}${overBudget?' ⚠ Over budget':''}</span>
        <span style="font-size:10px;color:var(--text-3)">${allocPct.toFixed(0)}% used</span>
      </div>
    </div>
  </div>`;
}
function suSourceRow(r,total,dealId,debtTiers,equityTiers,canDelete){
  const pct=total>0?(Number(r.amount)/total*100):0;
  const isDebt=debtTiers.includes(r.tier||r.category);
  const typeBadge=isDebt?'background:#EFF4FF;color:#2563EB;border-color:#BFCFFE':'background:#EAF5EF;color:#1E6B40;border-color:#B8DFC7';
  return`<div class="su-row">
    <span class="su-label" style="display:flex;align-items:center;gap:6px">${r.label}<span class="badge" style="font-size:9px;padding:1px 5px;${typeBadge}">${isDebt?'Debt':'Equity'}</span></span>
    <div class="su-bar-wrap"><div class="su-bar" style="width:${Math.min(pct,100)}%"></div></div>
    <span class="su-amount">${fmt$(r.amount)}</span>
    <span class="su-pct">${pct.toFixed(1)}%</span>
    ${canDelete?`<div style="display:flex;gap:4px;margin-left:4px"><button class="btn btn-ghost btn-xs" onclick="openSUModal('${dealId}',r.section,${r.id})">Edit</button><button class="btn btn-ghost btn-xs" onclick="deleteSU(${r.id},'${dealId}')">×</button></div>`:'<div style="width:68px"></div>'}
  </div>`;
}

          ${stack.map(r=>`<tr>

            <td>${r.party||'—'}</td>
            <td style="font-family:var(--mono)">${fmt$(r.amount)}</td>
            <td style="font-family:var(--mono)">${total>0?((Number(r.amount)/total)*100).toFixed(1)+'%':'—'}</td>

// ── QB CSV IMPORT ─────────────────────────────────
function openQBImport(dealId){
  const deal=allDeals.find(d=>d.id==dealId);
  openModal('modal-payment',`
    <button class="modal-close" onclick="closeModal('modal-payment')">×</button>
    <div class="modal-title">Import from QuickBooks</div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:18px;font-size:13px;color:var(--text-2);line-height:1.7">
      <strong style="color:var(--text)">How to export from QuickBooks:</strong><br>
      1. Reports → Transaction Detail by Account (or any transaction report)<br>
      2. Customize → add <strong>Class</strong> column → Class should match your deal names<br>
      3. Export → Download as CSV<br>
      4. Upload below — matched transactions import automatically, unclassified ones let you assign a deal manually
    </div>
    <div class="form-row">
      <label class="form-label">QuickBooks CSV Export</label>
      <input type="file" accept=".csv" id="qb-file" class="form-input" style="padding:6px" onchange="previewQBImport(${dealId})">
    </div>
    <div id="qb-preview"></div>
  `);
}

function parseQBCSV(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  let headerIdx=lines.findIndex(l=>l.toLowerCase().includes('date')&&(l.toLowerCase().includes('amount')||l.toLowerCase().includes('class')));
  if(headerIdx===-1)headerIdx=0;
  const headers=parseCSVRow(lines[headerIdx]).map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
  const rows=[];
  for(let i=headerIdx+1;i<lines.length;i++){
    const vals=parseCSVRow(lines[i]);
    if(vals.length<2)continue;
    const row={};
    headers.forEach((h,j)=>row[h]=vals[j]?vals[j].trim().replace(/^"|"$/g,''):'');
    rows.push(row);
  }
  return rows;
}

function parseCSVRow(line){
  const result=[];let cur='';let inQuote=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQuote=!inQuote;}
    else if(c===','&&!inQuote){result.push(cur);cur='';}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

function mapQBRow(r,dealId,findCol){
  const rawAmt=findCol(r,'amount','total','debit','credit');
  const amt=parseFloat(rawAmt.replace(/[$,()]/g,''))||0;
  const isCredit=rawAmt.includes('(');
  const rawDate=findCol(r,'date');
  let payDate=null;
  try{const d=new Date(rawDate);if(!isNaN(d))payDate=d.toISOString().split('T')[0];}catch(e){}
  return{
    pay_date:payDate,
    direction:isCredit?'Incoming':'Outgoing',
    party:findCol(r,'name','vendor','payee','customer'),
    category:findCol(r,'transaction type','type','account','memo')||'QB Import',
    amount:Math.abs(amt),
    notes:findCol(r,'memo','description','split'),
    from_qb:true,
    deal_id:dealId,
    created_by:currentUser.id,
    paid:true
  };
}

// Store parsed rows globally so confirmQBImport can read deal picker values
let _qbMatched=[], _qbUnmatched=[];

async function previewQBImport(dealId){
  const file=document.getElementById('qb-file').files[0];
  if(!file)return;
  const deal=allDeals.find(d=>d.id==dealId);
  const dealName=(deal?.name||'').toLowerCase().trim();
  const text=await file.text();
  const rows=parseQBCSV(text);
  const preview=document.getElementById('qb-preview');

  const findCol=(row,...names)=>{
    for(const n of names){const k=Object.keys(row).find(k=>k.includes(n));if(k)return row[k]||'';}
    return'';
  };

  // Separate into matched (class = this deal), other-deal (class = another deal), and unclassified
  const matched=[], unclassified=[];
  rows.forEach(r=>{
    const cls=(findCol(r,'class')||'').toLowerCase().trim();
    const mapped=mapQBRow(r,dealId,findCol);
    if(!mapped.amount||!mapped.pay_date)return;
    if(!cls){
      unclassified.push(mapped);
    } else if(cls===dealName||cls.includes(dealName)||(dealName.includes(cls)&&cls.length>3)){
      matched.push(mapped);
    }
    // transactions classified to OTHER deals are silently skipped here
  });

  _qbMatched=matched;
  _qbUnmatched=unclassified;

  if(!matched.length&&!unclassified.length){
    preview.innerHTML=`<div style="padding:16px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius-sm);color:var(--danger);font-size:13px;margin-top:12px">
      No matching or unclassified transactions found. Make sure transactions in QuickBooks have a Class set, or that at least some are unclassified so you can assign them here.
    </div>`;
    return;
  }

  const tableHead=(extra='')=>`<thead><tr>
    <th style="text-align:left;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">Date</th>
    <th style="text-align:left;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">Party</th>
    <th style="text-align:left;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">Type</th>
    <th style="text-align:left;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">Direction</th>
    <th style="text-align:right;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">Amount</th>
    ${extra}
  </tr></thead>`;

  preview.innerHTML=`<div style="margin-top:16px">
    ${matched.length?`
      <div style="font-size:11px;font-weight:600;color:var(--mint-text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--mint);display:inline-block"></span>
        ${matched.length} matched to "${deal?.name}"
      </div>
      <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:16px">
        <table style="width:100%;border-collapse:collapse">
          ${tableHead()}
          <tbody>${matched.map((p,i)=>previewRowHTML(p,i,false)).join('')}</tbody>
        </table>
      </div>`:''}

    ${unclassified.length?`
      <div style="font-size:11px;font-weight:600;color:var(--warning);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--warning);display:inline-block"></span>
        ${unclassified.length} unclassified — assign a deal or skip
      </div>
      <div style="max-height:220px;overflow-y:auto;border:1px solid var(--warning-border);border-radius:var(--radius-sm);margin-bottom:16px;background:var(--warning-bg)">
        <table style="width:100%;border-collapse:collapse">
          ${tableHead('<th style="text-align:left;font-size:10px;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--warning-bg)">Assign to Deal</th>')}
          <tbody style="background:var(--surface)">${unclassified.map((p,i)=>previewRowHTML(p,i,true)).join('')}</tbody>
        </table>
      </div>`:''}

    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:4px">
      <button class="btn btn-ghost" onclick="closeModal('modal-payment')">Cancel</button>
      <button class="btn btn-primary" id="qb-confirm-btn" onclick="confirmQBImport(${dealId})">
        Import ${matched.length} matched${unclassified.length?` + assigned unclassified`:''}
      </button>
    </div>
  </div>`;
}

async function confirmQBImport(dealId){
  const btn=document.getElementById('qb-confirm-btn');
  btn.textContent='Importing...';btn.disabled=true;

  // Collect unmatched rows that had a deal assigned
  const assigned=_qbUnmatched.map((p,i)=>{
    const sel=document.getElementById(`unmatched-deal-${i}`);
    const assignedDealId=sel?sel.value:'';
    if(!assignedDealId)return null;
    return{...p,deal_id:Number(assignedDealId)};
  }).filter(Boolean);

  const allRows=[..._qbMatched,...assigned];
  if(!allRows.length){closeModal('modal-payment');return;}

  try{
    for(let i=0;i<allRows.length;i+=50){
      await sb.from('payments').insert(allRows.slice(i,i+50));
    }
    closeModal('modal-payment');
    await renderDealDetail(dealId);
  }catch(err){
    btn.textContent='Import failed — try again';btn.disabled=false;
    console.error(err);
  }
}

function renderTasksGrouped(tasks){
  // apply status/person filter
  let f=tasks;
  if(taskFilter==='mine')f=tasks.filter(t=>t.assigned_to===currentUser.id);
  else if(taskFilter==='overdue')f=tasks.filter(t=>isOverdue(t.due_date,t.status));
  else if(taskFilter==='open')f=tasks.filter(t=>t.status==='Open');
  else if(taskFilter==='inprogress')f=tasks.filter(t=>t.status==='In Progress');
  else if(taskFilter==='done')f=tasks.filter(t=>t.status==='Done');
  else if(allUsers.find(u=>u.auth_id===taskFilter))f=tasks.filter(t=>t.assigned_to===taskFilter);
  // apply deal filter
  if(taskDealFilter!=='all')f=f.filter(t=>String(t.deal_id)===String(taskDealFilter));
  if(f.length===0)return'<div class="empty"><div class="empty-icon">✓</div><p>No tasks match these filters.</p></div>';

  // group by deal
  const groups={};
  f.forEach(t=>{
    const key=t.deal_id||'none';
    const name=t.deals?.name||'No Deal';
    if(!groups[key])groups[key]={name,tasks:[]};
    groups[key].tasks.push(t);
  });

  return Object.values(groups).sort((a,b)=>a.name.localeCompare(b.name)).map(g=>{
    const overdueInGroup=g.tasks.filter(t=>isOverdue(t.due_date,t.status)).length;
    return`
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${g.name}</div>
        <div style="font-size:11px;color:var(--text-3)">${g.tasks.length} task${g.tasks.length!==1?'s':''}</div>
        ${overdueInGroup>0?`<span class="badge badge-overdue">${overdueInGroup} overdue</span>`:''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Task</th><th>Assigned To</th><th>Due</th><th>Status</th><th>Created By</th><th>Actions</th></tr></thead>
          <tbody>
            ${g.tasks.map(t=>`<tr data-t="${(t.title||'').toLowerCase()}">
              <td style="font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
              <td>${userName(t.assigned_to)}</td>
              <td style="font-family:var(--mono);font-size:12px;${isOverdue(t.due_date,t.status)?'color:var(--danger)':''}">${fmtDate(t.due_date)}</td>
              <td>${taskBadge(t.status,t.due_date)}</td>
              <td class="watermark"><b>${userName(t.created_by)}</b></td>
              <td><div style="display:flex;gap:5px">
                ${t.status!=='Done'?`<button class="btn btn-mint btn-sm" onclick="markTaskDone(${t.id},null)">Done</button>`:''}
                <button class="btn btn-ghost btn-sm" onclick="deleteTask(${t.id})">×</button>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f,e){
  taskFilter=f;
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b=>b.classList.remove('active'));
  if(e?.target)e.target.classList.add('active');
  document.getElementById('tasks-wrap').innerHTML=renderTasksGrouped(allTasks);

function setDealFilter(f,e){
  taskDealFilter=f;
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b=>{if(b.textContent==='All Properties'||allDeals.find(d=>d.name===b.textContent))b.classList.remove('active');});

  document.querySelectorAll('#tasks-wrap [data-t]').forEach(tr=>tr.style.display=tr.dataset.t.includes(q)?'':'none');

    <div class="form-row"><label class="form-label">Address</label><input class="form-input" id="d-address" value="${deal.address||''}"></div>
    <div class="form-row-2">

      <div class="form-row"><label class="form-label">Phase</label><select class="form-select" id="d-phase">${phases.map(p=>`<option ${deal.phase===p?'selected':''}>${p}</option>`).join('')}</select></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label"># of Units</label><input class="form-input" id="d-units" type="number" value="${deal.num_units||''}"></div>
      <div class="form-row"><label class="form-label">Site Improvements ($)</label><input class="form-input" id="d-site" type="number" value="${deal.site_improvements||''}"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Acquisition Price</label><input class="form-input" id="d-acq" type="number" value="${deal.acquisition_price||''}"></div>
      <div class="form-row"><label class="form-label">Total Cost</label><input class="form-input" id="d-cost" type="number" value="${deal.total_cost||''}"></div>
    </div>

      <div class="form-row"><label class="form-label">Close Date</label><input class="form-input" id="d-close" type="date" value="${deal.close_date||''}"></div>
      <div class="form-row"><label class="form-label">Target Exit</label><input class="form-input" id="d-exit" type="date" value="${deal.target_exit_date||''}"></div>
    </div>

    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('modal-deal')">Cancel</button><button class="btn btn-primary" onclick="saveDeal(${deal.id||'null'})">${deal.id?'Save Changes':'Create Deal'}</button></div>`;
}
function openNewDeal(){openModal('modal-deal',dealFormHTML());}
function openEditDeal(id){openModal('modal-deal',dealFormHTML(allDeals.find(d=>d.id==id)||{}));}
async function saveDeal(id){
  const data={name:document.getElementById('d-name').value.trim(),address:document.getElementById('d-address').value.trim(),type:document.getElementById('d-type').value,phase:document.getElementById('d-phase').value,num_units:document.getElementById('d-units').value||null,site_improvements:document.getElementById('d-site').value||null,acquisition_price:document.getElementById('d-acq').value||null,total_cost:document.getElementById('d-cost').value||null,close_date:document.getElementById('d-close').value||null,target_exit_date:document.getElementById('d-exit').value||null,notes:document.getElementById('d-notes').value.trim(),created_by:currentUser.id};
  if(!data.name)return alert('Deal name is required.');
  if(id){await sb.from('deals').update(data).eq('id',id);closeModal('modal-deal');await renderDealDetail(id);}
  else{const{data:nd}=await sb.from('deals').insert(data).select().single();closeModal('modal-deal');await navigateTo('deal-detail',nd.id);}

// ── MODAL: TASK ───────────────────────────────────
function openTaskModal(dealId, task=null){
  const t=task||{};
  openModal('modal-task',`<button class="modal-close" onclick="closeModal('modal-task')">×</button>
    <div class="modal-title">${t.id?'Edit Task':'New Task'}</div>
    <div class="form-row"><label class="form-label">Task *</label><input class="form-input" id="t-title" value="${t.title||''}" placeholder="e.g. Submit permit application"></div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Assign To *</label><select class="form-select" id="t-assign">${allUsers.map(u=>`<option value="${u.auth_id}" ${(t.assigned_to||currentUser.id)===u.auth_id?'selected':''}>${u.name}</option>`).join('')}</select></div>
      <div class="form-row"><label class="form-label">Due Date</label><input class="form-input" id="t-due" type="date" value="${t.due_date||''}"></div>
    </div>
    <div class="form-row"><label class="form-label">Status</label><select class="form-select" id="t-status">
      ${['Open','In Progress','Done'].map(s=>`<option ${(t.status||'Open')===s?'selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('modal-task')">Cancel</button><button class="btn btn-primary" onclick="saveTask(${dealId},${t.id||'null'})">${t.id?'Save Changes':'Create Task'}</button></div>`);
}
function openNewTask(dealId){openTaskModal(dealId);}
function editTask(taskId,dealId){
  const t=allTasks.find(x=>x.id===taskId);
  if(t)openTaskModal(dealId,t);
}
async function saveTask(dealId,id=null){
  const data={deal_id:dealId,title:document.getElementById('t-title').value.trim(),assigned_to:document.getElementById('t-assign').value||null,due_date:document.getElementById('t-due').value||null,status:document.getElementById('t-status').value};
  if(!data.title)return alert('Title required.');
  if(id){await sb.from('tasks').update(data).eq('id',id);}
  else{data.created_by=currentUser.id;await sb.from('tasks').insert(data);}
  closeModal('modal-task');
  if(currentPage==='tasks')await renderTasks();else await renderDealDetail(dealId);
}
async function markTaskDone(id,dealId){
  await sb.from('tasks').update({status:'Done'}).eq('id',id);
  if(currentPage==='tasks')await renderTasks();else if(dealId)await renderDealDetail(dealId);
}
async function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  await sb.from('tasks').delete().eq('id',id);
  if(currentPage==='tasks')await renderTasks();else await renderDealDetail(currentDealId);
}

// ── MODAL: MILESTONE ──────────────────────────────
async function openMilestoneModal(dealId,id=null){
  let m={};
  if(id){const {data}=await sb.from('milestones').select('*').eq('id',id).single();m=data||{};}
  openModal('modal-milestone',`<button class="modal-close" onclick="closeModal('modal-milestone')">×</button>
    <div class="modal-title">${id?'Edit Milestone':'New Milestone'}</div>
    <div class="form-row"><label class="form-label">Title *</label><input class="form-input" id="m-title" value="${m.title||''}" placeholder="e.g. Close construction loan"></div>
    <div class="form-row"><label class="form-label">Target Date</label><input class="form-input" id="m-date" type="date" value="${m.target_date||''}"></div>
    <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="m-notes">${m.notes||''}</textarea></div>
    <div class="form-row"><label class="form-label">Links (one per line)</label><textarea class="form-textarea" id="m-links">${(m.links||[]).join('\n')}</textarea></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('modal-milestone')">Cancel</button><button class="btn btn-primary" onclick="saveMilestone(${dealId},${id||'null'})">${id?'Save Changes':'Add Milestone'}</button></div>`);
}
function openNewMilestone(dealId){openMilestoneModal(dealId);}
async function saveMilestone(dealId,id=null){
  const links=document.getElementById('m-links').value.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const data={deal_id:dealId,title:document.getElementById('m-title').value.trim(),target_date:document.getElementById('m-date').value||null,notes:document.getElementById('m-notes').value.trim(),links};

  if(id){await sb.from('milestones').update(data).eq('id',id);}
  else{data.completed=false;await sb.from('milestones').insert(data);}
  closeModal('modal-milestone');await renderDealDetail(dealId);
}
async function toggleMilestone(id,completed,dealId){await sb.from('milestones').update({completed,completed_date:completed?today():null}).eq('id',id);await renderDealDetail(dealId);}
async function deleteMilestone(id,dealId){if(!confirm('Delete?'))return;await sb.from('milestones').delete().eq('id',id);await renderDealDetail(dealId);}

// ── MODAL: PAYMENT ────────────────────────────────
async function openPaymentModal(dealId,id=null){
  const cats=['Construction Draw','Debt Service','Equity Distribution','Acquisition','Fee','Tax','Insurance','Permit','Legal','Other'];
  const {data:suLines}=await sb.from('sources_uses').select('id,label').eq('deal_id',dealId).eq('section','use').order('label');
  let p={};
  if(id){const {data}=await sb.from('payments').select('*').eq('id',id).single();p=data||{};}
  openModal('modal-payment',`<button class="modal-close" onclick="closeModal('modal-payment')">×</button>
    <div class="modal-title">${id?'Edit Payment':'Log Payment'}</div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Direction *</label><select class="form-select" id="p-dir">
        <option ${(p.direction||'Outgoing')==='Outgoing'?'selected':''}>Outgoing</option>
        <option ${p.direction==='Incoming'?'selected':''}>Incoming</option>
      </select></div>
      <div class="form-row"><label class="form-label">Date *</label><input class="form-input" id="p-date" type="date" value="${p.pay_date||today()}"></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Category</label><select class="form-select" id="p-cat">${cats.map(c=>`<option ${p.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-row"><label class="form-label">Amount *</label><input class="form-input" id="p-amount" type="number" value="${p.amount||''}"></div>
    </div>
    <div class="form-row"><label class="form-label">Party</label><input class="form-input" id="p-party" value="${p.party||''}" placeholder="e.g. General Contractor"></div>
    <div class="form-row" style="background:var(--mint-light);border:1px solid var(--mint-mid);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px">
      <label class="form-label" style="color:var(--mint-text)">Link to Uses Line for progress tracking</label>
      <select class="form-select" id="p-su">
        <option value="">— None (won't count toward S&U progress) —</option>
        ${(suLines||[]).map(s=>`<option value="${s.id}" ${String(p.su_id)===String(s.id)?'selected':''}>${s.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-label">Type</label><select class="form-select" id="p-sched">
        <option value="false" ${!p.scheduled?'selected':''}>Actual payment</option>
        <option value="true" ${p.scheduled?'selected':''}>Scheduled / future</option>
      </select></div>
      <div class="form-row"><label class="form-label">Paid?</label><select class="form-select" id="p-paid">
        <option value="true" ${p.paid!==false?'selected':''}>Yes — paid</option>
        <option value="false" ${p.paid===false?'selected':''}>No — pending</option>
      </select></div>
    </div>
    <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="p-notes">${p.notes||''}</textarea></div>
    <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('modal-payment')">Cancel</button><button class="btn btn-primary" onclick="savePayment(${dealId},${id||'null'})">${id?'Save Changes':'Log Payment'}</button></div>`);
}
async function openNewPayment(dealId){openPaymentModal(dealId);}
async function savePayment(dealId,id=null){
  const suVal=document.getElementById('p-su').value;
  const data={deal_id:dealId,direction:document.getElementById('p-dir').value,pay_date:document.getElementById('p-date').value||null,category:document.getElementById('p-cat').value,amount:document.getElementById('p-amount').value||null,party:document.getElementById('p-party').value.trim(),su_id:suVal?Number(suVal):null,scheduled:document.getElementById('p-sched').value==='true',paid:document.getElementById('p-paid').value==='true',notes:document.getElementById('p-notes').value.trim()};
  if(!data.amount)return alert('Amount required.');
  if(id){await sb.from('payments').update(data).eq('id',id);}
  else{data.created_by=currentUser.id;await sb.from('payments').insert(data);}
  closeModal('modal-payment');await renderDealDetail(dealId);
}
async function deletePayment(id,dealId){if(!confirm('Delete?'))return;await sb.from('payments').delete().eq('id',id);await renderDealDetail(dealId);}

function openAddLink(dealId){

    <div class="form-row"><label class="form-label">Label</label><input class="form-input" id="l-label" placeholder="e.g. Google Drive, LOI, Permits"></div>

async function saveLink(dealId){
  const url=document.getElementById('l-url').value.trim();if(!url)return alert('URL required.');
  const{data:deal}=await sb.from('deals').select('links').eq('id',dealId).single();
  const links=deal.links||[];links.push({label:document.getElementById('l-label').value.trim()||'Link',url});
  await sb.from('deals').update({links}).eq('id',dealId);closeModal('modal-link');await renderDealDetail(dealId);
}
async function deleteLink(dealId,index){
  if(!confirm('Remove?'))return;
  const{data:deal}=await sb.from('deals').select('links').eq('id',dealId).single();
  const links=(deal.links||[]).filter((_,i)=>i!==index);
  await sb.from('deals').update({links}).eq('id',dealId);await renderDealDetail(dealId);
}
